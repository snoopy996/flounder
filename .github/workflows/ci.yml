name: CI

# Keep CI deterministic and cheap. Do not add provider secrets, pi login, or
# live Flounder audit commands here; PRs should never be able to spend AI quota.

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      npm_config_cache: .npm-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run check

      - name: Build and test
        run: npm test

      - name: API catalog contract
        run: npm run check:api-catalog:dist

      - name: Database upgrade contract
        run: npm run check:db-upgrade:dist

      - name: Public-surface scan
        run: npm run check:public

      - name: Package dry run
        run: npm pack --dry-run
